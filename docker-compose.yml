

services:
  # Наш первый сервис: Склад (База данных)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: crypto_db
    ports:
      - "5432:5432"  # Открываем порт наружу, чтобы ты мог подключиться через DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data # Чтобы данные не исчезали при перезапуске

  # Наш второй сервис: Твой скрипт (Манипулятор)
  miner:
    build: .  # Строить из текущей папки (использует твой Dockerfile)
    command: python -u producer.py
    volumes:
      - .:/app # Монтируем код, чтобы обновлять на лету
    depends_on:
      - db # Запускать только ПОСЛЕ того, как встанет база
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PASSWORD=${DB_PASSWORD}
      - PIKA_PASSWORD=${PIKA_PASSWORD}

  dashboard:
    build: .
    # ВАЖНО: Мы переопределяем команду запуска.
    # По умолчанию Dockerfile запускает main.py, но тут нам нужен dashboard.py
    # И запускается он через команду "streamlit run"
    command: streamlit run dashboard.py --server.port 8501
    volumes:
      - .:/app
    ports:
      - "8501:8501" # Пробрасываем порт наружу, чтобы ты открыл в браузере
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PASSWORD=${DB_PASSWORD}
      - PIKA_PASSWORD=${PIKA_PASSWORD}

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Порт для общения роботов (скриптов)
      - "15672:15672" # Порт для людей (Веб-интерфейс управления)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: ${PIKA_PASSWORD}


  worker:
    build: .
    command: python -u worker.py
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PASSWORD=${DB_PASSWORD}
      - PIKA_PASSWORD=${PIKA_PASSWORD}

  alert:
    build: .
    command: python -u alert.py
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PASSWORD=${DB_PASSWORD}
      - PIKA_PASSWORD=${PIKA_PASSWORD}
      - TG_TOKEN=${TG_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PASSWORD=${DB_PASSWORD}
      - PIKA_PASSWORD=${PIKA_PASSWORD}
    ports:
      - "8080:8000"
volumes:
  postgres_data: # Объявляем место для хранения данных
  rabbitmq_data:
